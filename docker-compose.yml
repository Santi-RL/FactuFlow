version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: factuflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-factuflow}
      POSTGRES_USER: ${POSTGRES_USER:-factuflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factuflow}
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factuflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factuflow-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-cambiar-esto-en-produccion}
      APP_DEBUG: ${APP_DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://factuflow:factuflow@postgres:5432/factuflow}
      ARCA_ENV: ${ARCA_ENV:-homologacion}
      CERTS_PATH: /app/certs
      ARCA_TOKEN_CACHE_PATH: /app/data/arca_token_cache.json
      BATCH_SYNC_LIMIT: ${BATCH_SYNC_LIMIT:-100}
      BATCH_MAX_ROWS: ${BATCH_MAX_ROWS:-20000}
      BATCH_MAX_GROUPS: ${BATCH_MAX_GROUPS:-5000}
      BATCH_WORKER_ENABLED: ${BATCH_WORKER_ENABLED:-true}
      BATCH_WORKER_POLL_SECONDS: ${BATCH_WORKER_POLL_SECONDS:-5}
      BATCH_WORKER_BATCH_SIZE: ${BATCH_WORKER_BATCH_SIZE:-1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      LOG_FILE: /app/logs/factuflow.log
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./data:/app/data
      - ./certs:/app/certs
      - ./logs:/app/logs
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - factuflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: factuflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      NODE_ENV: ${NODE_ENV:-development}
    networks:
      - factuflow-network
    depends_on:
      - backend

networks:
  factuflow-network:
    driver: bridge

volumes:
  postgres_data:
